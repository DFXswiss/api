services:
  db:
    image: postgres:16
    container_name: dfx-postgres
    environment:
      - POSTGRES_USER=sa
      - POSTGRES_PASSWORD=LocalDev2026@SQL
      - POSTGRES_DB=dfx
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sa -d dfx"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 10s

volumes:
  postgres_data:
