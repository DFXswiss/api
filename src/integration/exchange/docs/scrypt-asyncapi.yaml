      - $ref: '#/channels/User/messages/userEventMsg'
    tags:
      - name: User Administration
  UserConfig:
    action: send
    channel:
      $ref: '#/channels/UserConfig'
    summary: Update user configuration
    description: 'Command used to update user config on behalf of session user. Results of this command will be visible in the `User` stream.'
