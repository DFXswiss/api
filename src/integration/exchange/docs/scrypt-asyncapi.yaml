  Trade:
    action: receive
    channel:
      $ref: '#/channels/Trade'
    summary: Stream of Trade updates
    x-subscription:
      $ref: '#/components/schemas/TradeSubscription'
    description: >
      Upon Subscription, the server will return all Trade for this client as long as the optional constraints are satisfied. Server will also send a Trade update when the order receives more fills or new fills arrive on a new order that came in as long as the optional constraints are satisfied.
    messages:
      - $ref: '#/channels/Trade/messages/tradeEventMsg'
    tags:
      - name: Post Trade
  Quote:
    action: receive
    channel:
      $ref: '#/channels/Quote'
    summary: Receive Quote stream updates
    x-subscription:
      $ref: '#/components/schemas/QuoteSubscription'
    messages:
      - $ref: '#/channels/Quote/messages/quoteEventMsg'
    tags:
      - name: RFQ
  QuoteRequest:
    action: send
    channel:
      $ref: '#/channels/QuoteRequest'
    summary: RFQ (Request for Quote)
    description: >
      This section outlines how to request quotes from multiple dealers simultaneously and accept them using the Scrypt API. To send a quote request, first subscribe to the [Quote](#api-operation-receive-Quote) stream, and the [ExecutionReport](#api-operation-receive-ExecutionReport) stream as with orders. All quote responses are sent as [Quote](#api-operation-receive-Quote) updates, and all order responses and updates are sent as [ExecutionReport](#api-operation-receive-ExecutionReport).
      
      To request a quote, send a [QuoteRequest](#api-operation-send-QuoteRequest) message. The server responds with one or many [Quote](#api-operation-receive-Quote) messages as the streaming prices update. An in-progress [Quote](#api-operation-receive-Quote) can be cancelled by sending a [QuoteCancelRequest](#api-operation-send-QuoteCancelRequest) message. [Quote](#api-operation-receive-Quote) time out automatically after 3 minutes by default.
      
      To accept a quote, send a [NewOrderSingle (RFQ)](#api-operation-send-NewOrderSingle) message.
      
      A typical workflow to request and accept a quote would be:
      
        1. Subscribe to `Quote`
        2. Subscribe to `ExecutionReport`
        3. Subscribe to Trade with `StartDate` of the `Timestamp` of the last Trade processed to recover any missed trades
        4. **To request a quote, first generate a new `QuoteReqID` (see instructions below). Send a `QuoteRequest` specifying the `QuoteReqID`, `OrderQty`, `Currency` etc. for that request**
        5. `Quote` updates will be received that are able to be priced
        6. To accept a quote that is received, send a `NewOrderSingle` referencing the `RFQID` and parameters depending on `OrdType`
        7. Fills will be received as `ExecutionReport` with `ExecType=Trade`
        8. `QuoteStatus` will change to `Filled` when the `Quote` is successfully accepted
      
      To generate a `QuoteReqID`, we recommend using a UUID4 or another globally unique identifier. `QuoteReqID` must be unique and with length less than or equal to 36 characters.
    messages:
      - $ref: '#/channels/QuoteRequest/messages/quoteRequestMessage'
    tags:
      - name: RFQ
  QuoteCancelRequest:
    action: send
    channel:
      $ref: '#/channels/QuoteCancelRequest'
    summary: Cancel a quote request
    description: 'Command used to cancel an open RFQ. Results of this command will be visible in the Quote stream.'
    messages:
      - $ref: '#/channels/QuoteCancelRequest/messages/quoteCancelRequestMessage'
    tags:
      - name: RFQ
  Balance:
    action: receive
    channel:
      $ref: '#/channels/Balance'
    summary: Receive Balance updates
    x-subscription:
      $ref: '#/components/schemas/BalanceSubscription'
    messages:
