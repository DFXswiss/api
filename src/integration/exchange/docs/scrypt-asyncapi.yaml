x-extras:
  title: REST API
  paths:
    /v1/symbols/{symbol}/ohlcv/{resolution}:
      get:
        name: OHLCV
        summary: Get the open, high, low, close, and volume parameters for a given symbol and resolution
        parameters:
          $ref: '#/components/schemas/OHLCVParameters'
        responses:
          '200':
            description: OK
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/OHLCV'
components:
  securitySchemes:
    ApiKey:
      type: httpApiKey
      name: "ApiKey"
      in: header
      description: >
        Your Scrypt API key.
    ApiTimestamp:
      x-custom-type: Timestamp
      type: httpApiKey
      name: "ApiTimestamp"
      in: header
      description: >
        An ISO-8601 UTC string of the form 2019-02-13T05:17:32.000000Z
    ApiSign:
      x-custom-type: Signature
      type: httpApiKey
      name: "ApiSign"
      in: header
      description: >
        The signature is a base64 encoded SHA256 HMAC using the API secret of the following:  

        `GET\n<ApiTimestamp>\n<host>\n<path>`  

        For example,  

        `GET\n2019-02-13T05:17:32.000000Z\ndemo.scrypt.swiss\n/ws/v1`

  schemas:
    AllStreams:
      type: array
      items:
        oneOf:
          - $ref: '#/components/schemas/MarketDataSnapshotSubscription'
          - $ref: '#/components/schemas/BalanceSubscription'
          - $ref: '#/components/schemas/SecuritySubscription'
          - $ref: '#/components/schemas/CurrencySubscription'
          - $ref: '#/components/schemas/CurrencyConversionSubscription'
          - $ref: '#/components/schemas/OrderSubscription'
          - $ref: '#/components/schemas/ExecutionReportSubscription'
          - $ref: '#/components/schemas/TradeSubscription'
          - $ref: '#/components/schemas/QuoteSubscription'
          - $ref: '#/components/schemas/ExposureSubscription'
          - $ref: '#/components/schemas/BalanceTransactionSubscription'
          - $ref: '#/components/schemas/UserSubscription'
    BaseResponse:
      type: object
      required: [reqid, ts, seqNum]
      properties:
        reqid:
          type: integer
          description: Echoed back request ID
        ts:
          type: string
          format: date-time
          description: Timestamp of message publication
        initial:
          type: boolean
          description: Flag to indicate if this message is the initial state of the stream
        seqNum:
          type: integer
          description: Incrementing sequence number of messages for request ID starting with 1
        tag:
          type: string
          description: Echoed back tag for this request
        next:
          type: string
          description: If paging, tag for next page of data

    HelloEvent:
      type: object
      required: [type, ts, session_id]
      additionalProperties: false
      properties:
        type:
          type: string
          enum: [hello]
          description: 'Always "hello"'
        ts:
          type: string
          format: date-time
          description: 'An ISO-8601 UTC string'
        session_id:
          type: string
          description: 'A session ID that uniquely identifies this websocket session.'

    MarketDataSnapshotSubscription:
      type: object
      required: [name, Symbol]
      additionalProperties: false
      properties:
        name:
          type: string
          enum: [MarketDataSnapshot]
        Symbol:
          type: string
          description: Security to request
        Throttle:
          type: string
          description: >
            An optional throttle duration for updates, defaults to
            configured `MinMarketDataThrottle`. A throttle is
            specified by a time duration + units. For example: "300ms",
            "500us". Valid time units are "ns", "us", "ms", "s".
        PriceIncrement:
          type: string
          description: Price increment for levels to enable price bucketing
        Depth:
          type: string
          description: Maximum number of bid / offer levels to stream prices for
        SizeBuckets:
          type: array
          items:
            type: string
          description: >
            A list of sizes to return price levels for; defaults to
            configured Security SizeBuckets
      examples:
        - name: Subscribe
          payload:
            reqid: 2
            type: subscribe
            streams:
              - name: MarketDataSnapshot
                Symbol: BTC-USD

    MarketDataSnapshotEvent:
      type: object
      required: [Timestamp, Symbol, Status, Bids, Offers]
      additionalProperties: false
      properties:
        Timestamp:
          type: string
          format: date-time
          description: Timestamp when the market data snapshot was generated
        Symbol:
          type: string
          description: Trading symbol for the security (e.g., BTC-USD)
