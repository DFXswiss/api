  Order:
    address: Order
    description: >
      ## Orders
      
      This section outlines how to send orders using the Scrypt API. To send orders, first subscribe to the [ExecutionReport](#api-operation-receive-ExecutionReport) stream. All order responses and updates are sent as [ExecutionReport](#api-operation-receive-ExecutionReport)'s. Send requests with the [NewOrderSingle](#api-operation-send-NewOrderSingle), [OrderCancelRequest](#api-operation-send-OrderCancelRequest), [OrderCancelReplaceRequest](#api-operation-send-OrderCancelReplaceRequest), and [OrderControlRequest](#api-operation-send-OrderControlRequest) messages.
      
      A typical trading strategy would do the following:
      
        1. Subscribe to `MarketDataSnapshot` for the relevant securities
        2. Subscribe to `ExecutionReport` with `StartDate` of the `Timestamp` of the last `ExecutionReport` processed to recover order state
        3. Subscribe to `Trade` with `StartDate` of the `Timestamp` of the last `Trade` processed to recover any missed trades
        4. Maintain a map of (`OrderID`, last received `ExecutionReport`) for open orders
        5. Maintain a set of `ClOrdID` for each pending request
        6. To submit an order, first generate a new `ClOrdID`. Send a `NewOrderSingle` specifying the `ClOrdID`, `Side`, `Price`, `OrderQty`, `Strategy`, etc. for that request
        7. The response for the request will be received on the `ExecutionReport` stream with the `ClOrdID` being the `ClOrdID` specified on the `NewOrderSingle`. If the order is accepted (`ExecType=PendingNew`), then add this order to the set of open orders
        8. To cancel or modify the open order, generate a new `ClOrdID` and send an `OrderCancelRequest` or `OrderCancelReplaceRequest` specifying the `ClOrdID`, `OrigClOrdID` from the previous successful request, and remaining parameters
        9. Fills will be received as `ExecutionReport` with `ExecType=Trade`
      
      <div class="callout">
        To generate a <code>ClOrdID</code>, we recommend using a <a href="https://en.wikipedia.org/wiki/Universally_unique_identifier">UUID4</a> or another globally unique identifier. <code>ClOrdID</code> must be unique daily and among an y open order and must be less than 36 characters.
      </div>

      <div class="callout">
        The orders API roughly follows the same semantics as the <a href="https://www.fixtrading.org/standards/">FIX Protocol</a>, though with some notable differences, see <a href="#order-state-change-matrices">Order State Change Matrices</a> for more details.
      </div>


      ## Supported Order Strategies

      ### SteadyPace

      A schedule-based algorithm that divides an order into suborders (clips) and submits them at equal, user defined intervals.
      
      #### SteadyPace Parameters

      <table>
        <thead>
          <tr>
            <th>Parameter</th>
            <th>Type</th>
            <th>Required</th>
            <th>Description</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td><code>ClipSize</code></td>
            <td>Qty</td>
            <td>Y</td>
            <td>
              A quantity (subset of the total order size) to send on each
              execution of the schedule.
            </td>
          </tr>
          <tr>
            <td><code>ClipInterval</code></td>
            <td>string</td>
            <td>Y</td>
            <td>
              Time interval between individual clips specified as an interval
              string.
            </td>
          </tr>
          <tr>
            <td><code>StartTime</code></td>
            <td>string</td>
            <td>N</td>
            <td>
              Time at which this order will activate and begin sending orders.
              An ISO-8601 UTC string of the form
              <code>2019-02-13T05:17:32.000000Z</code>
            </td>
          </tr>
          <tr>
            <td><code>EndTime</code></td>
            <td>string</td>
            <td>N</td>
            <td>
              Optional expire time for the order. An ISO-8601 UTC string of
              the form <code>2019-02-13T05:17:32.000000Z</code>
            </td>
          </tr>
          <tr>
            <td><code>Variance</code></td>
            <td>decimal</td>
            <td>N</td>
            <td>Optional degree of randomization for clip sizes.</td>
          </tr>
        </tbody>
      </table>

      <div class="callout">
        An interval or duration string is a possibly signed sequence of
        decimal numbers, each with optional fraction and a unit suffix, such
        as <code>300ms</code> or <code>2h45m</code>. Valid time units are
        <code>ns</code>, <code>us</code> (or <code>Вµs</code>),
        <code>ms</code>, <code>s</code>, <code>m</code>, <code>h</code>.
      </div>

      <div class="callout">
        A variance of <code>0.1</code> (implying a variance of
        <code>10%</code>) for a clip size of <code>1.0</code> would result in
        clips ranging between <code>0.9</code> and <code>1.1</code>.
      </div>


      ### StopLimit

      This strategy will only place the order once the specified stop price
      has been met. For a Buy StopLimit order, the stop price must be
      *above* the current market price. For a Sell StopLimit order,
      the stop price must be *below* the current market price.

      #### StopLimit Parameters

      <table>
        <thead>
          <tr>
            <th>Parameter</th>
            <th>Type</th>
            <th>Required</th>
            <th>Description</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td><code>TriggerPrice</code></td>
            <td>Price</td>
            <td>Y</td>
            <td>
              The price that must be met to trigger execution of the order
              with the configured limit price.
            </td>
          </tr>
          <tr>
            <td><code>EndTime</code></td>
            <td>string</td>
            <td>N</td>
            <td>
              Optional expire time for the order. An ISO-8601 UTC string of
              the form <code>2019-02-13T05:17:32.000000Z</code>
            </td>
          </tr>
        </tbody>
      </table>
    messages:
      orderEventMsg:
        name: OrderEvent
        payload:
          allOf:
            - $ref: '#/components/schemas/BaseResponse'
            - type: object
              $id: 'OrderEvent'
              required: [type, data]
