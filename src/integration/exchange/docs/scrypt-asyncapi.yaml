x-auth-examples:
  - name: WS
    language: Python
    code: |
      ```python
      # to install websocket lib:
      # $ pip install websocket-client
      from websocket import create_connection
      import datetime
      import hmac
      import hashlib
      import base64

      api_key = "<apikey>"
      api_secret = "<apisecret>"
      utc_now = datetime.datetime.utcnow()
      utc_datetime = utc_now.strftime("%Y-%m-%dT%H:%M:%S.000000Z")

      host = "<websocket host>" # demo.scrypt.swiss, for example
      path = "/ws/v1"
      params = "\n".join([
        "GET",
        utc_datetime,
        host,
        path,
      ])
      hash = hmac.new(
        api_secret.encode('ascii'), params.encode('ascii'), hashlib.sha256)
      hash.hexdigest()
      signature = base64.urlsafe_b64encode(hash.digest()).decode()
      header = {
        "ApiKey": api_key,
        "ApiSign": signature,
        "ApiTimestamp": utc_datetime,
      }

      ws = create_connection("wss://" + host + path, header=header)

      while True:
        print(ws.recv())
      ```
  - name: REST
    language: Python
    code: |
      ```python
      # to install requests lib:
      # $ pip install requests
      import requests
      import datetime
      import hmac
      import hashlib
      import base64

      api_key = "<apikey>"
      api_secret = "<apisecret>"
      utc_now = datetime.datetime.utcnow()
      utc_datetime = utc_now.strftime("%Y-%m-%dT%H:%M:%S.000000Z")

      host = "<host>" # demo.scrypt.swiss, for example
      path = "/v1"
      query = ""
      body = ""

      params = [
        "GET",
        utc_datetime,
        host,
        path,
      ]
      endpoint = "https://" + host + path
      if query:
        endpoint += "?" + query
        params.append(query)
      if body:
        params.append(body)

      payload = "\n".join(params)
      hashvalue = hmac.new(
        api_secret.encode('ascii'), payload.encode('ascii'), hashlib.sha256)
      hashvalue.hexdigest()
      signature = base64.urlsafe_b64encode(hashvalue.digest()).decode()
      headers = {
        "ApiKey": api_key,
        "ApiSign": signature,
        "ApiTimestamp": utc_datetime,
      }

      print(requests.get(url=endpoint, headers=headers))
      ```
channels:
  hello:
    address: hello
    messages:
      helloEventMsg:
        name: Hello
        payload:
          $ref: '#/components/schemas/HelloEvent'
        examples:
          - name: Hello
            payload:
              type: hello
              ts: "2019-10-16T10:41:23.168807Z"
              session_id: "1109RQ13KXR00"
  subscribe:
    address: subscribe
    messages:
      subscribeMessage:
        name: Subscribe
        payload:
          type: object
          required:
            - reqid
            - ts
            - type
            - streams
          properties:
            reqid:
              type: integer
              description: >
                A number that identifies this request and will be included on responses to this request.
                <div class="callout"><code>reqid</code> cannot be equal to 0.</div>
            type:
              type: string
              enum: [subscribe]
              description: '"subscribe" for initializing a subscription'
            tag:
              type: string
              description: Optional user generated tag to attach to stream data
            ts:
              type: string
              format: date-time
              description: An ISO-8601 UTC string of the form 2019-02-13T05:17:32.000000Z
            streams:
              $ref: '#/components/schemas/AllStreams'
        examples:
          - name: Subscribe
            payload:
              reqid: 1
              type: subscribe
              tag: "my-tag"
              streams:
                - name: MessageType
                  Arg1: 1
              ts: "2019-02-13T05:17:32.000000Z"
  amend:
    address: amend
    messages:
      amendMessage:
        name: Amend
        payload:
          type: object
          required:
            - reqid
            - type
            - tag
            - streams
          additionalProperties: false
          properties:
            reqid:
              type: integer
              description: Request ID - will be echoed back in the response structure
            type:
              type: string
              enum: [amend]
              description: '"amend" for amending a subscription'
            tag:
              type: string
              description: Optional user generated tag to attach to stream data
            streams:
              type: array
              items:
                oneOf:
                  - $ref: '#/components/schemas/MarketDataSnapshotSubscription'
                  - $ref: '#/components/schemas/BalanceSubscription'
                  - $ref: '#/components/schemas/SecuritySubscription'
                  - $ref: '#/components/schemas/CurrencySubscription'
                  - $ref: '#/components/schemas/CurrencyConversionSubscription'
                  - $ref: '#/components/schemas/OrderSubscription'
                  - $ref: '#/components/schemas/ExecutionReportSubscription'
                  - $ref: '#/components/schemas/TradeSubscription'
                  - $ref: '#/components/schemas/QuoteSubscription'
                  - $ref: '#/components/schemas/ExposureSubscription'
                  - $ref: '#/components/schemas/BalanceTransactionSubscription'
                  - $ref: '#/components/schemas/UserSubscription'
              description: Streams to subscribe to
        examples:
          - name: Amend
            payload:
              reqid: 1
              type: amend
              ts: "2019-02-13T05:17:32.000000Z"
              streams:
                - name: Security
  page:
    address: page
    messages:
      pageMessage:
        name: Page
        payload:
          type: object
          required:
            - reqid
            - type
            - data
          properties:
            reqid:
              type: integer
              description: The request ID to continue the page, must match the original request ID
            type:
              type: string
              enum: [page]
              description: '"page" for continuing the paged stream'
            data:
              type: array
              items:
                type: object
                required:
                  - name
                  - after
                properties:
                  name:
                    type: string
                    description: Subscription name to continue the page
                  after:
                    type: string
                    description: Delivered `next` value from the paged stream payload
              description: Stream request data to continue
        examples:
          - name: Page
            payload:
              reqid: 1
              type: page
              data:
                - name: Security
