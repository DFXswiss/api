                  Symbol: "BTC-USD"
                  OrderID: "1b6b882b-e2fc-4774-ad2d-9db4df536f29"
                  ClOrdID: "58b9adb0-15aa-11ec-b0a2-2554a9e1e7a4"
                  SubmitTime: "2021-09-14T22:23:11.903074Z"
