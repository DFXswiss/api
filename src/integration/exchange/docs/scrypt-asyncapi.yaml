        RFQID:
          type: string
          description: Server assigned RFQID for RFQ Orders
        CustomerUser:
          type: string
          description: The customer user associated with this trade
        AggressorSide:
          type: string
          enum: [Buy, Sell]
          description: Side that initiated the trade
        DealtCurrency:
          type: string
          description: Currency that was dealt in the trade

    QuoteEvent:
      type: object
      required: [Timestamp, Symbol, Currency, QuoteReqID, QuoteStatus, QuoteID, SubmitTime, OrderQty, AmountCurrency, EndTime, Side, ValidUntilTime]
      additionalProperties: false
      properties:
        Timestamp:
          type: string
          format: date-time
          description: Timestamp of the message
        Symbol:
          type: string
          description: Symbol of the order security
        Currency:
          type: string
          description: Currency of Quantity
        RFQID:
          type: string
          description: Server assigned RFQID for RFQ Orders
        QuoteReqID:
          type: string
          description: Client assigned Quote Req ID for the quote request
        QuoteStatus:
          type: string
          enum: [PendingNew, Open, PendingCancel, Canceled, PendingFill, Filled, Rejected]
          description: Status of the quote
        QuoteID:
          type: string
          description: Server assigned ID for this quote update
        QuoteRequestRejectReason:
          type: string
          enum: [UnknownSymbol, OrderExceedsLimit, TooLateToEnter, UnknownOrder, DuplicateOrder, StaleRequest, InternalError, BrokerOption, RateLimit, ForceCancel, ImmediateOrderDidNotCross, PostOnlyOrderWouldCross, InvalidStrategy, QuoteRequestTimeout, QuoteExpired]
          description: 'Quote request reject reason, specified when ExecType=Rejected'
        SubmitTime:
          type: string
          format: date-time
          description: Time of original quote request submission
        OrderQty:
          type: string
          description: Order quantity
        AmountCurrency:
          type: string
          description: Currency of Amount
        EndTime:
          type: string
          format: date-time
          description: End time of RFQ
        Side:
          type: string
          enum: [Buy, Sell]
          description: Buy or Sell
        TradedPx:
          type: string
          description: The price of the trade if the quote is filled. This will be an all-in price that includes fees
        TradedQty:
          type: string
          description: The quantity of the trade if the quote is filled in units of Currency
        TradedAmt:
          type: string
          description: The amount of the trade if the quote is filled in units of AmountCurrency
        TradedSide:
          type: string
          enum: [Buy, Sell]
          description: The side of the trade if the quote is filled
        BidPx:
          type: string
          description: Bid quote price
        BidAmt:
          type: string
          description: Bid quote amount in units of AmountCurrency
        OfferPx:
          type: string
          description: Offer quote price
        OfferAmt:
          type: string
          description: Offer quote amount in units of AmountCurrency
        ValidUntilTime:
          type: string
          format: date-time
          description: The expire time of the quote
        Text:
          type: string
          description: Human readable error message
        CustomerUser:
          type: string
          description: The customer user associated with this quote

    QuoteRequestData:
      type: object
      required: [QuoteReqID, OrderQty, Currency, Symbol]
      additionalProperties: false
      properties:
        Timestamp:
          type: string
          format: date-time
          description: Timestamp of the message
        Symbol:
          type: string
          description: Symbol of the security to submit an order on
        Currency:
          type: string
          description: The currency that the quantity is specified in
        QuoteReqID:
          type: string
          description: Unique ID for this request, usually a UUID
        Side:
          type: string
          enum: [Buy, Sell]
          description: 'Optional side for a one sided request, either Buy or Sell. Leave blank for a two way quote'
        OrderQty:
          type: string
          description: Requested quantity in units of Currency
        TransactTime:
          type: string
          format: date-time
          description: 'An ISO-8601 UTC string'
        Parameters:
          type: object
          description: Additional quote request parameters

    QuoteCancelRequestData:
      type: object
      required: [QuoteReqID, RFQID, TransactTime]
      additionalProperties: false
      properties:
        QuoteReqID:
          type: string
          description: '`QuoteReqID` from the request to cancel'
        RFQID:
          type: string
          description: '`RFQID` to cancel, required and must align with `QuoteReqID`'
        TransactTime:
          type: string
          format: date-time
          description: 'An ISO-8601 UTC string'

    ExposureEvent:
      type: object
      required: [Timestamp, ExposureCurrency, Exposure, ExposureLimit, Status]
      additionalProperties: false
      properties:
        Timestamp:
          type: string
          format: date-time
          description: The last time the credit was updated as an ISO-8601 UTC string
        ExposureCurrency:
          type: string
          description: The currency all exposure values are expressed in
        Exposure:
          type: string
          description: Current credit utilization expressed in the `ExposureCurrency`
        ExposureLimit:
          type: string
          description: Credit limit expressed in the `ExposureCurrency`
        Status:
          type: string
          enum: [Online, Offline]
          description: Status of the exposure information

    BalanceTransactionEvent:
      type: object
      required: [Timestamp, ClReqID, TransactionID, Revision, TransactionType, MarketAccount, Quantity, Currency, Status, LastUpdateTime]
      additionalProperties: false
      properties:
        Timestamp:
          type: string
          format: date-time
          description: Timestamp of the balance transaction event
        ClReqID:
          type: string
          description: Client request ID for the transaction
        TransactionID:
          type: string
          description: Unique identifier for the transaction
        Revision:
          type: integer
          description: Revision number of the transaction
        TransactionType:
          type: string
          description: Type of the transaction (e.g., Withdrawal, Deposit)
        MarketAccount:
          type: string
          description: Market account associated with the transaction
        Quantity:
          type: string
          description: Amount of the transaction
        Currency:
          type: string
          description: Currency of the transaction
        Status:
          type: string
          description: Current status of the transaction (e.g., PendingApproval, Approved, Rejected)
        LastUpdateTime:
          type: string
          format: date-time
          description: Last time the transaction was updated

    UserEvent:
      type: object
      required: [CustomerUserID, Email, DisplayName, Config]
      additionalProperties: false
      properties:
        CustomerUserID:
          type: string
          description: Unique identifier for the customer user
        Email:
          type: string
          description: Email address of the user
        DisplayName:
          type: string
          description: Display name of the user
        Config:
          type: array
          items:
            type: object
            required: [Timestamp, CustomerUserID, Key, Value]
            properties:
              Timestamp:
                type: integer
                description: Unix timestamp in nanoseconds when the configuration was set
              CustomerUserID:
                type: string
                description: Customer user ID associated with this configuration
              Key:
                type: string
                description: Configuration key
              Value:
                type: string
                description: Configuration value (JSON string)
          description: Array of user configuration settings

    BalanceTransactionSubscription:
      type: object
      required: [name]
      additionalProperties: false
      properties:
        name:
          type: string
          enum: [BalanceTransaction]
      examples:
        - name: Subscribe
          payload:
            reqid: 9
            type: subscribe
            streams:
              - name: BalanceTransaction

    UserSubscription:
      type: object
      required: [name]
      additionalProperties: false
      properties:
        name:
          type: string
          enum: [User]

    NewWithdrawRequestData:
      type: object
      required: [Currency, ClReqID, Quantity]
      additionalProperties: false
      properties:
        Currency:
          type: string
          description: The currency that the quantity is specified in
        ClReqID:
          type: string
          description: Unique ID for this request, usually a UUID
        Quantity:
          type: string
          description: Requested quantity in units of Currency
        TransactTime:
          type: string
          format: date-time
          description: 'An ISO-8601 UTC string'
        MarketAccount:
          type: string
          description: Market account associated with the transaction
        RoutingInfo:
          type: object
          properties:
            WalletAddress:
              type: string
              description: Destination wallet address
            Memo:
              type: string
              description: Optional memo for the transaction
            DestinationTag:
              type: string
              description: Optional destination tag for the transaction
          description: 'Provides routing info for the transaction such as WalletAddress. If this cannot be mapped to an existing address, it will be included on the BalanceTransaction. Cannot be provided alongside AddressID'
        AddressID:
          type: string
          description: 'Optional address ID to attach to the withdraw transaction. Cannot be provided alongside RoutingInfo'

    WithdrawCancelRequestData:
      type: object
      required: [TransactionID]
      additionalProperties: false
      properties:
        TransactionID:
          type: string
          description: ID of the transaction to cancel

    NewDepositRequestData:
      type: object
      required: [Currency, ClReqID, Quantity, TxHashes]
      additionalProperties: false
      properties:
        Currency:
          type: string
          description: The currency that the quantity is specified in
        ClReqID:
          type: string
          description: Unique ID for this request, usually a UUID
        Quantity:
          type: string
          description: Requested quantity in units of Currency
        TransactTime:
          type: string
          format: date-time
          description: 'An ISO-8601 UTC string'
        MarketAccount:
          type: string
          description: Market account associated with the transaction
        TxHashes:
          type: array
          items:
            type: object
            required: [TxHash]
            properties:
              TxHash:
                type: string
                description: Transaction hash
          description: List of blockchain transaction hashes associated with that deposit request

    UserConfigData:
      type: object
      required: [Key]
      additionalProperties: false
      properties:
        Timestamp:
          type: string
          format: date-time
          description: Timestamp of the message
        Mode:
          type: string
          enum: [Enabled, Disabled]
          description: Optional mode on config, either Enabled or Disabled
        Key:
          type: string
          description: Key of config
        Value:
          type: string
          description: Value of config

    OHLCVParameters:
      type: object
      required: [symbol, resolution]
      additionalProperties: false
      properties:
        symbol:
          x-in: path
          schema:
            type: string
        resolution:
          x-in: path
          schema:
            type: string
            examples:
              - 1h
              - 1d
        startDate:
          x-in: query
          description: >
            If provided, will return data starting at this time. An ISO-8601 UTC string of the form `2019-02-13T05:17:32.000000Z`.
          schema:
            type: string
            format: date-time
        endDate:
          x-in: query
          description: >
            If provided, will return data ending at this time. An ISO-8601 UTC string of the form `2019-02-13T05:17:32.000000Z`.
          schema:
            type: string
            format: date-time
      examples:
        - name: Request
          payload: 'GET /v1/symbols/BTC-USD/ohlcv/1h'

    OHLCV:
      type: object
      required: [Timestamp, Symbol, Volume, Open, Close, High, Low, Ticks]
      additionalProperties: false
      properties:
        Timestamp:
          type: string
          format: date-time
          description: The start time for this interval
        Symbol:
          type: string
          description: A unique symbol for this security
        Volume:
          type: string
          format: decimal
          description: Total base-currency volume traded (if any) for the symbol in the time interval
        Open:
          type: string
          format: decimal
          description: First trade price (if any) for the symbol in the time interval
        Close:
          type: string
          format: decimal
          description: Last trade price (if any) for the symbol in the time interval
        High:
          type: string
          format: decimal
          description: Highest traded price (if any) for the symbol in the time interval
        Low:
          type: string
          format: decimal
          description: Lowest traded price (if any) for the symbol in the time interval
        Ticks:
          type: string
          format: decimal
          description: Total number of ticks for the symbol in the time interval
      examples:
        - name: Response
          payload:
            type: OHLCV
            ts: '2019-09-16T14:57:19.785823Z'
            data:
              - Timestamp: '2023-02-27T10:52:00.000000Z'
                Symbol: 'BTC-USD'
                Open: '23413.30000'
                High: '23418.24'
                Low: '23399.46'
                Close: '23407.10000'
                Volume: '0.49309984'
                Ticks: 74