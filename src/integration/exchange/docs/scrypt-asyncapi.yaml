    ExecutionReportEvent:
      type: object
      required: [Timestamp, Symbol, OrderID, ClOrdID, SubmitTime, ExecID, Side, ExecType, OrdStatus, OrderQty, OrdType, Currency, LeavesQty, CumQty, TimeInForce, AmountCurrency, SessionID, CustomerUser]
      additionalProperties: false
      properties:
        Timestamp:
          type: string
          format: date-time
          description: Timestamp of the message
        Symbol:
          type: string
          description: Symbol of the order security
        OrderID:
          type: string
          description: Server assigned Order ID, will be a UUID
        ClOrdID:
          type: string
          description: Client assigned Order ID for the last request
        OrigClOrdID:
          type: string
          description: Original client assigned Order ID
        SubmitTime:
          type: string
          format: date-time
          description: Time of original order submission
        ExecID:
          type: string
          description: Server assigned ID of this update, will be a UUID
        Side:
          type: string
          enum: [Buy, Sell]
          description: Buy or Sell
        TransactTime:
          type: string
          format: date-time
          description: 'An ISO-8601 UTC string'
        ExecType:
          type: string
          enum: [New, Trade, Canceled, Replaced, PendingCancel, Stopped, Rejected, PendingNew, Restated, PendingReplace, CancelRejected, ReplaceRejected, PendingResume, Resumed, PendingPause, Paused, Triggered, Started]
          description: 'Describes the specific execution (e.g. Pending Cancel) while OrdStatus will always identify the current order status (e.g. Partially Filled)'
        OrdStatus:
          type: string
          enum: [New, PartiallyFilled, Filled, Canceled, PendingCancel, Rejected, PendingNew, PendingReplace]
          description: Identifies current status of order
        OrderQty:
          type: string
          description: Order quantity
        OrdType:
          type: string
          enum: [Market, Limit, RFQ]
          description: Order type
        Price:
          type: string
          description: 'Order limit price, required when OrdType=Limit'
        Currency:
          type: string
          description: Currency of Quantity
        LeavesQty:
          type: string
          description: 'Quantity open for further execution. If the OrdStatus is Canceled or Rejected (in which case the order is no longer active) then LeavesQty could be 0, otherwise LeavesQty = OrderQty - CumQty'
        CumQty:
          type: string
          description: 'Total quantity filled. Always in Currency units (BTC of a BTC-USD order)'
        AvgPx:
          type: string
          description: 'Average filled price of the order. Only valid if CumQty > 0. Does not include fees'
        TimeInForce:
          type: string
          enum: [GoodTillCancel, FillAndKill, FillOrKill]
          description: Specifies how long the order remains in effect
        LastPx:
          type: string
          description: 'Last price, specified when ExecType=Trade'
        LastQty:
          type: string
          description: 'Last qty, specified when ExecType=Trade'
        LastAmt:
          type: string
          description: 'Last amount, specified when ExecType=Trade'
        LastFee:
          type: string
          description: 'Last fee, specified when ExecType=Trade'
        LastFeeCurrency:
          type: string
          description: 'Last fee currency, specified when ExecType=Trade. Note this may be different from the cumulative fee'
        CumAmt:
          type: string
          description: 'Total amount filled. Always in Amount currency (USD of a BTC-USD order)'
        FeeCurrency:
          type: string
          description: Cumulative fee currency
        OrdRejReason:
          type: string
          enum: [UnknownSymbol, OrderExceedsLimit, TooLateToEnter, UnknownOrder, DuplicateOrder, StaleRequest, InternalError, BrokerOption, RateLimit, ForceCancel, ImmediateOrderDidNotCross, PostOnlyOrderWouldCross, InvalidStrategy, QuoteRequestTimeout, QuoteExpired]
          description: 'Order reject reason, specified when ExecType=Rejected'
        CxlRejReason:
          type: string
          enum: [UnknownOrder, Broker, OrderAlreadyInPendingCancelOrPendingReplaceStatus, DuplicateClOrdID, TooLateToCancel, StaleRequest, RateLimit, InvalidStrategy, Other]
          description: 'Cancel reject reason, specified when ExecType=CancelRejected or ExecType=ReplaceRejected'
        QuoteID:
          type: string
          description: Server assigned QuoteID for RFQ Orders
        AmountCurrency:
          type: string
          description: Currency of Amount
        SessionID:
          type: string
          description: SessionID that submitted this order
        CancelSessionID:
          type: string
          description: 'If specified, the order will be cancelled when this session is closed'
        Strategy:
          type: string
          description: Name of the Order Strategy to use
        RFQID:
          type: string
          description: Server assigned RFQID for RFQ Orders
        AllowedSlippage:
          type: string
          description: 'AllowedSlippage in absolute value (ie. 0.001 = 10 bps) if specified on order'
        Text:
          type: string
          description: Human readable error message
        CustomerUser:
          type: string
          description: The customer user associated with this execution report
        Parameters:
          type: object
          description: Additional execution report parameters
          properties:
            ErrorAction:
              type: string
              enum: [Pause, Continue, Cancel]
              description: Action to take on error

