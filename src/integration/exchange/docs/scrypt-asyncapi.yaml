operations:
  Hello:
    action: receive
    channel:
      $ref: '#/channels/hello'
    description: 'After a client connects, the server will send an unsolicited hello message.'
    messages:
      - $ref: '#/channels/hello/messages/helloEventMsg'
    tags:
      - name: Protocol
  Subscribe:
    action: send
    channel:
      $ref: '#/channels/subscribe'
    summary: Send a subscription request to begin a stream of data.
    description: >
      Clients issue requests to subscribe to data.
      The server responds to requests with one or more response messages that reference the request by echoing back the `reqid` field.  
      
      Response structure is as follows:
      <table>
        <thead>
          <tr>
            <th>Key</th>
            <th>Type</th>
            <th>Required</th>
            <th>Description</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td><code>reqid</code></td>
            <td>number</td>
            <td>Y</td>
            <td>A number that relates this response to a request.</td>
          </tr>
          <tr>
            <td><code>seq</code></td>
            <td>number</td>
            <td>Y</td>
            <td>
              The sequence number for this response per request.
              <code>seq</code> begins at 1 on the first message with this
              <code>reqid</code> and increments by one for each message sent
              on this <code>reqid</code>.
            </td>
          </tr>
          <tr>
            <td><code>type</code></td>
            <td>string</td>
            <td>Y</td>
            <td>
              The type of message sent. This document describes all valid
              message types.
            </td>
          </tr>
          <tr>
            <td><code>tag</code></td>
            <td>string</td>
            <td>N</td>
            <td>An optional tag from the stream request.</td>
          </tr>
          <tr>
            <td><code>ts</code></td>
            <td>number</td>
            <td>Y</td>
            <td>
              An ISO-8601 UTC string of the form
              <code>2019-02-13T05:17:32.000000Z</code>.
            </td>
          </tr>
          <tr>
            <td><code>initial</code></td>
            <td>bool</td>
            <td>N</td>
            <td>
              If this is initial data for a request, the
              <code>initial</code> flag will be set.
            </td>
          </tr>
          <tr>
            <td><code>action</code></td>
            <td>string</td>
            <td>N</td>
            <td>"Update" or "Remove"</td>
          </tr>
          <tr>
            <td><code>total_count</code></td>
            <td>number</td>
            <td>N</td>
            <td>The total number of records for this stream.</td>
          </tr>
        </tbody>
      </table>
      <aside class="callout">
        <code>seq</code> is for debug purposes only, the client is not
        required to do any sequencing.
      </aside>
      <aside class="callout">
        If a request requires responses with different types, then multiple
        responses may have the <code>initial</code> flag set for different types.
      </aside>
      <aside class="callout">
        <code>action</code> is either <code>Update</code> or <code>Remove</code> and tells the client if the
        given entity should be removed or added/updated. The key for a given
        entity depends on the message type.
      </aside>
    messages:
      - $ref: '#/channels/subscribe/messages/subscribeMessage'
    tags:
      - name: Protocol
  Amend:
    action: send
    channel:
      $ref: '#/channels/amend'
    summary: Amend an Existing Stream
    description: >
      Amend an existing stream subscription by Request ID. Response structure
      remains the same, just the content of the <code>data</code> will
      change per the amendment.
    messages:
      - $ref: '#/channels/amend/messages/amendMessage'
    tags:
      - name: Protocol
  Page:
    action: send
    channel:
      $ref: '#/channels/page'
    summary: Continue a Paged Stream
    description: >
      If you request a stream that is paged, the data on the stream will be delivered with a `next` field populated. If given this field, request the next set of data with the below structure. Response continues as with the original stream.
    messages:
      - $ref: '#/channels/page/messages/pageMessage'
    tags:
      - name: Protocol
  Cancel:
    action: send
    channel:
      $ref: '#/channels/cancel'
    summary: Cancel an Existing Stream
    description: >
      Cancel an existing stream by Request ID. No response, unless there is
      an error. Stream will just stop.
    messages:
      - $ref: '#/channels/cancel/messages/cancelMessage'
    tags:
      - name: Protocol
  Security:
    action: receive
    channel:
      $ref: '#/channels/Security'
    summary: Stream of available securities for trading.
    description: >
      On initial request, a snapshot of all available securities is provided. All subsequent messages are deltas to the securities snapshot.
    x-subscription:
      $ref: '#/components/schemas/SecuritySubscription'
    messages:
      - $ref: '#/channels/Security/messages/securityEventMsg'
    tags:
      - name: Security Master
  Currency:
    action: receive
    channel:
      $ref: '#/channels/Currency'
    summary: Stream of available currencies used within trading.
    description: >
      On initial request, a snapshot of all available currencies is provided. All subsequent messages are deltas to the currency snapshot.
    x-subscription:
      $ref: '#/components/schemas/CurrencySubscription'
    messages:
      - $ref: '#/channels/Currency/messages/currencyEventMsg'
    tags:
      - name: Security Master
  MarketDataSnapshot:
    action: receive
    channel:
      $ref: '#/channels/MarketDataSnapshot'
    summary: Receive MarketDataSnapshot updates
    x-subscription:
      $ref: '#/components/schemas/MarketDataSnapshotSubscription'
    messages:
      - $ref: '#/channels/MarketDataSnapshot/messages/marketDataSnapshotEventMsg'
    tags:
      - name: Market Data
  CurrencyConversion:
    action: receive
    channel:
      $ref: '#/channels/CurrencyConversion'
    summary: Stream of currency conversion rates.
    x-subscription:
      $ref: '#/components/schemas/CurrencyConversionSubscription'
    messages:
      - $ref: '#/channels/CurrencyConversion/messages/currencyConversionEventMsg'
    tags:
      - name: Market Data
  Order:
    action: receive
    channel:
      $ref: '#/channels/Order'
    x-subscription:
      $ref: '#/components/schemas/OrderSubscription'
    messages:
      - $ref: '#/channels/Order/messages/orderEventMsg'
    tags:
      - name: Orders
  ExecutionReport:
    action: receive
    channel:
      $ref: '#/channels/ExecutionReport'
    summary: Receive ExecutionReport updates
    x-subscription:
      $ref: '#/components/schemas/ExecutionReportSubscription'
    messages:
      - $ref: '#/channels/ExecutionReport/messages/executionReportEventMsg'
    tags:
      - name: Orders
  NewOrderSingle:
    action: send
    channel:
      $ref: '#/channels/NewOrderSingle'
    summary: Submit a new order
    description: 'Command used to submit a new order either against any provided liquidity or an open RFQ. Results of this command will be visible in the `Order`, `ExecutionReport` and `Trade` streams which will track the lifecycle of the order.'
    messages:
      - $ref: '#/channels/NewOrderSingle/messages/newOrderSingleMessage'
    tags:
      - name: Orders
  OrderCancelRequest:
    action: send
    channel:
      $ref: '#/channels/OrderCancelRequest'
    summary: Cancel an existing order
    description: 'Command used to cancel an open order. Results of this command will be visible in the Order and ExecutionReport streams.'
    messages:
      - $ref: '#/channels/OrderCancelRequest/messages/orderCancelRequestMessage'
    tags:
      - name: Orders
  OrderCancelReplaceRequest:
    action: send
    channel:
      $ref: '#/channels/OrderCancelReplaceRequest'
    summary: Modify an existing order
    description: 'Command used to modify an open order. Results of this command will be visible in the `Order` and `ExecutionReport` streams.'
    messages:
      - $ref: '#/channels/OrderCancelReplaceRequest/messages/orderCancelReplaceRequestMessage'
    tags:
      - name: Orders
  OrderControlRequest:
    action: send
    channel:
      $ref: '#/channels/OrderControlRequest'
    summary: Control an existing order
    description: 'Command used to control an open order. Results of this command will be visible in the Order and ExecutionReport streams.'
    x-post-doc:
      description: >
        ## Order State Change Matrices
        
        The orders API follows FIX 4.4 semantics closely. The main difference is that instead of sending separate OrderCancelReject messages, two extra ExecType are supported: CancelRejected and ReplaceRejected. The order state change matrices below are heavily inspired by the FIX documentation.

