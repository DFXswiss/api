    summary: Receive BalanceTransaction stream updates
    x-subscription:
      $ref: '#/components/schemas/BalanceTransactionSubscription'
    messages:
      - $ref: '#/channels/BalanceTransaction/messages/balanceTransactionEventMsg'
    tags:
      - name: Balances and Credit
  NewWithdrawRequest:
    action: send
    channel:
      $ref: '#/channels/NewWithdrawRequest'
    summary: Request a new withdrawal
    description: 'Command used to request a new withdrawal.'
    messages:
      - $ref: '#/channels/NewWithdrawRequest/messages/newWithdrawRequestMessage'
    tags:
      - name: Balances and Credit
  WithdrawCancelRequest:
    action: send
    channel:
      $ref: '#/channels/WithdrawCancelRequest'
    summary: Cancel a withdrawal request
    description: 'Command used to cancel a withdrawal. Only transactions in `PendingApproval` state can be cancelled.'
    messages:
      - $ref: '#/channels/WithdrawCancelRequest/messages/withdrawCancelRequestMessage'
    tags:
      - name: Balances and Credit
  NewDepositRequest:
    action: send
    channel:
      $ref: '#/channels/NewDepositRequest'
    summary: Request a new deposit
    description: 'Command used to request a new deposit. Results of this command will be visible in the `BalanceTransaction` stream.'
    messages:
      - $ref: '#/channels/NewDepositRequest/messages/newDepositRequestMessage'
    tags:
      - name: Balances and Credit
  User:
    action: receive
    channel:
      $ref: '#/channels/User'
    summary: Request for updates for this customer user. No subscription parameters.
    x-subscription:
      $ref: '#/components/schemas/UserSubscription'
