asyncapi: 3.0.0
id: 'urn:uuid:2e6c3c9a-5685-11ee-8c99-0242ac120002'
info:
  title: Scrypt WebSocket API
  version: 1.0.0
  x-logo: /scrypt-logo-dark.svg
  x-download-name: scrypt-api.asyncapi.yaml
  description: >
    The websocket API provides the user with access to real-time market data subscription,
    orders execution and balance information.

    ## API Keys
        
    If you do not have an API key and a signature assigned, you will need to obtain them first. You can do so by using the following method.  

    Email Scrypt support staff at: [trade@scrypt.swiss](mailto:trade@scrypt.swiss)  

    You will need separate API Keys for connecting to the sandbox and production environments.

    ## Rate Limits  

    There is no limit to how many concurrent websocket connections you're allowed, though this may change in the future.
    If you expect to have more than ~10 active connections, please contact [trade@scrypt.swiss](mailto:trade@scrypt.swiss).

    ## General Notes

      - Timestamps: In all API requests, the user has the option to
      provide a timestamp (ts) in an ISO-8601 UTC string format with
      microsecond resolution. While optional, we recommend taking
      advantage of this field, as it will both enable our system to
      monitor client-server latency and allow certain security features.

      - All system responses are tied to a specific client request. The
      user should provide a unique reqid (Request ID) on each request,
      and the system will echo this reqid on the corresponding
      responses.
