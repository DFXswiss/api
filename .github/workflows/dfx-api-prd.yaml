name: DFX API PRD CI/CD

on:
  # Auto-deploy on main-branch merges. Builds the linux/arm64 image, pushes
  # dfxswiss/dfx-api:latest to Docker Hub, then SSHs to dfxprd (via the
  # Cloudflare Access tunnel) and runs the deploy hook. Paths-ignore mirrors
  # dfx-api-dev.yaml so docs/infrastructure-only changes don't trigger a
  # full build+deploy.
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'infrastructure/**'
  # Manual escape hatch (e.g. rebuild :latest without a code change).
  workflow_dispatch:

env:
  DOCKER_TAGS: dfxswiss/dfx-api:latest

permissions:
  contents: read

# Serialize PRD deploys: a running build+deploy is never interrupted, and a
# newer main-merge waits instead of racing the SSH deploy hook / :latest pull.
concurrency:
  group: deploy-prd
  cancel-in-progress: false

jobs:
  build-and-deploy:
    name: Build and deploy to PRD
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ env.DOCKER_TAGS }}
          platforms: linux/arm64
          build-args: GIT_COMMIT=${{ github.sha }}

      - name: Install cloudflared
        run: |
          curl -fsSL https://github.com/cloudflare/cloudflared/releases/download/2025.4.0/cloudflared-linux-arm64 -o /usr/local/bin/cloudflared
          chmod +x /usr/local/bin/cloudflared

      - name: Deploy
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_PRD_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          echo "${{ secrets.DEPLOY_PRD_SSH_KNOWN_HOSTS }}" > ~/.ssh/known_hosts
          ssh -i ~/.ssh/deploy_key \
            -o ProxyCommand="cloudflared access ssh --hostname ${{ secrets.DEPLOY_PRD_HOST }}" \
            ${{ secrets.DEPLOY_PRD_USER }}@${{ secrets.DEPLOY_PRD_HOST }} \
            "dfx-api"
